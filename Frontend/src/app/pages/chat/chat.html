<div style="display:flex; gap:12px; max-width:900px; margin:20px auto; font-family:Arial;">
  <!-- Users -->
  <div style="width:260px; border:1px solid #ddd; border-radius:8px; padding:10px;">
    <h3>Users</h3>

    <div *ngFor="let u of users"
         (click)="select(u)"
         style="padding:8px; border-radius:6px; cursor:pointer;"
         [style.background]="selectedUser?.id === u.id ? '#f2f2f2' : 'transparent'">

      <div style="display:flex; align-items:center; gap:10px;">
        <img *ngIf="u.profileImageUrl" [src]="u.profileImageUrl"
             style="width:36px;height:36px;border-radius:50%;object-fit:cover;">
        <div>
          <div style="font-weight:bold;">{{u.fullName}}</div>
          <div style="font-size:12px;color:#666;">{{u.email}}</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div style="flex:1; border:1px solid #ddd; border-radius:8px; padding:10px;">
    <h3>Chat</h3>
    <div style="color:#666; margin-bottom:8px;">
      To: {{ selectedUser?.fullName || 'Select a user' }}
    </div>

    <div style="height:360px; overflow:auto; border:1px solid #eee; border-radius:8px; padding:10px;">
      <div *ngFor="let m of messages" style="margin-bottom:10px;">
        <div style="font-size:12px;color:#666;">{{m.sentAt | date:'short'}}</div>
        <div><b>{{m.fromUserId}}</b>: {{m.text}}</div>
      </div>
    </div>

    <div style="display:flex; gap:8px; margin-top:10px;">
      <input [(ngModel)]="text" placeholder="Type message..." style="flex:1;">
      <button (click)="send()">Send</button>
    </div>
  </div>
</div>
